name: Deploy Quartz to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Clone Quartz
        run: git clone --branch v4.5.2 --depth 1 https://github.com/jackyzha0/quartz.git quartz-app

      - name: Copy Wiki Content and Config
        run: |
          rm -rf quartz-app/content/*
          cp -rv wiki/* quartz-app/content/
          cp -v quartz/quartz.config.ts quartz-app/
          cp -v quartz/quartz.layout.ts quartz-app/
          cp -v quartz/styles/custom.scss quartz-app/quartz/styles/

      - name: Install Dependencies
        working-directory: quartz-app
        run: npm ci

      - name: Build Quartz
        working-directory: quartz-app
        run: npx quartz build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: quartz-app/public

  deploy:
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: acti